<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование — МЕТРОНОМ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="main.js" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#EAB308',
                        secondary: '#F3F4F6',
                        'muted-foreground': '#6B7280',
                        border: '#E5E7EB'
                    }
                }
            }
        }
    </script>
    <style>
        .step-content { display: none; }
        .step-content.active { display: block; }
        .card-selected { border-color: #EAB308; ring: 2px; --tw-ring-color: #EAB308; }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans">

    <div class="min-h-screen py-24 px-4 lg:px-8">
        <div class="container mx-auto max-w-6xl">
            <div class="mb-12">
                <div class="flex items-center mb-6">
                    <div class="w-1 h-16 bg-accent mr-6"></div>
                    <h1 class="text-4xl md:text-5xl font-bold">Бронирование</h1>
                </div>
            </div>

            <div class="mb-12">
                <div class="flex items-center justify-between max-w-3xl mx-auto" id="progress-bar">
                    </div>
            </div>

            <form id="booking-form">
                
                <div id="step-1" class="step-content active max-w-4xl mx-auto">
                    <h2 class="text-2xl font-semibold mb-8">Выберите услугу</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="services-grid">
                        </div>
                </div>

                <div id="step-2" class="step-content max-w-4xl mx-auto">
                    <h2 class="text-2xl font-semibold mb-8">Выберите фотографа</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="photographers-grid">
                        </div>

                    <div class="bg-secondary p-6">
                        <h3 class="text-lg font-semibold mb-4">Дополнительные услуги</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="addons-grid">
                            </div>
                    </div>
                </div>

                <div id="step-3" class="step-content max-w-4xl mx-auto">
                    <h2 class="text-2xl font-semibold mb-8">Выберите дату и время</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div>
                            <h3 class="font-semibold mb-4">Дата съемки</h3>
                            <input type="date" id="date-input" class="w-full border p-4 focus:border-accent outline-none">
                        </div>
                        <div>
                            <h3 class="font-semibold mb-4">Время съемки</h3>
                            <div class="grid grid-cols-3 gap-3" id="time-slots">
                                </div>
                        </div>
                    </div>
                </div>

                <div id="step-4" class="step-content max-w-4xl mx-auto">
                    <h2 class="text-2xl font-semibold mb-8">Подтверждение бронирования</h2>
                    <div class="bg-secondary p-8 mb-8">
                        <div class="space-y-6" id="summary-content">
                            </div>
                    </div>

                    <div class="border border-border p-6 mb-8">
                        <h3 class="font-semibold mb-4">Контактная информация</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" placeholder="Ваше имя" required class="border px-4 py-3 focus:border-accent outline-none">
                            <input type="tel" placeholder="Телефон" required class="border px-4 py-3 focus:border-accent outline-none">
                            <input type="email" placeholder="Email" required class="border px-4 py-3 focus:border-accent outline-none col-span-full">
                        </div>
                        <textarea placeholder="Комментарий к заказу" rows="3" class="w-full border px-4 py-3 mt-4 focus:border-accent outline-none"></textarea>
                    </div>

                    <button onclick="handleBooking(event)" class="w-full bg-accent text-white py-4 text-lg hover:bg-accent/90 transition-colors">
    Подтвердить бронирование
</button>
                </div>

                <div class="flex justify-between mt-12 max-w-4xl mx-auto">
                    <button type="button" id="prev-btn" class="px-8 py-3 border border-foreground hover:bg-foreground hover:text-white disabled:opacity-50 disabled:cursor-not-allowed">
                        Назад
                    </button>
                    <button type="button" id="next-btn" class="px-8 py-3 bg-accent text-white hover:bg-accent/90 disabled:opacity-50">
                        Далее
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const data = {
            services: [
                { id: 1, name: 'Портретная съемка', price: 5000, duration: '1 час' },
                { id: 2, name: 'Fashion съемка', price: 8000, duration: '2 часа' },
                { id: 3, name: 'Семейная фотосессия', price: 7000, duration: '1.5 часа' }
            ],
            photographers: [
                { id: 1, name: 'Анна Петрова', specialty: 'Портрет и beauty' },
                { id: 2, name: 'Дмитрий Соколов', specialty: 'Fashion' },
                { id: 3, name: 'Елена Волкова', specialty: 'Семейная съемка' }
            ],
            addons: [
                { id: 'makeup', name: 'Визажист', price: 3000 },
                { id: 'stylist', name: 'Стилист', price: 2500 },
                { id: 'wardrobe', name: 'Аренда гардероба', price: 1500 },
                { id: 'props', name: 'Реквизит', price: 1000 }
            ],
            timeSlots: ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00']
        };

        let state = {
            step: 1,
            service: null,
            photographer: null,
            addons: [],
            date: '',
            time: null
        };

        function init() {
            renderProgress();
            renderServices();
            renderPhotographers();
            renderAddons();
            renderTimeSlots();
            updateNavigation();
        }

        // Рендеринг и логика выбора
        function renderServices() {
            const grid = document.getElementById('services-grid');
            grid.innerHTML = data.services.map(s => `
                <div onclick="selectService(${s.id})" class="border p-6 cursor-pointer transition-all hover:border-accent ${state.service === s.id ? 'ring-2 ring-accent border-accent' : ''}">
                    <h3 class="text-lg font-semibold mb-2">${s.name}</h3>
                    <p class="text-sm text-muted-foreground mb-4">⏱ ${s.duration}</p>
                    <div class="text-xl font-bold">${s.price.toLocaleString()} ₽</div>
                </div>
            `).join('');
        }

        function selectService(id) {
            state.service = id;
            renderServices();
            updateNavigation();
        }

        function renderPhotographers() {
            const grid = document.getElementById('photographers-grid');
            grid.innerHTML = data.photographers.map(p => `
                <div onclick="selectPhotographer(${p.id})" class="border p-6 cursor-pointer text-center hover:border-accent ${state.photographer === p.id ? 'ring-2 ring-accent border-accent' : ''}">
                    <div class="w-16 h-16 bg-gray-200 rounded-full mx-auto mb-4 flex items-center justify-center font-bold text-xl">${p.name[0]}</div>
                    <h3 class="font-semibold">${p.name}</h3>
                    <p class="text-xs text-muted-foreground">${p.specialty}</p>
                </div>
            `).join('');
        }

        function selectPhotographer(id) {
            state.photographer = id;
            renderPhotographers();
            updateNavigation();
        }

        function renderAddons() {
            const grid = document.getElementById('addons-grid');
            grid.innerHTML = data.addons.map(a => `
                <div onclick="toggleAddon('${a.id}')" class="border p-4 cursor-pointer flex justify-between hover:border-accent ${state.addons.includes(a.id) ? 'bg-accent/10 border-accent' : ''}">
                    <span>${a.name}</span>
                    <span class="text-muted-foreground">+${a.price} ₽</span>
                </div>
            `).join('');
        }

        function toggleAddon(id) {
            const index = state.addons.indexOf(id);
            if (index > -1) state.addons.splice(index, 1);
            else state.addons.push(id);
            renderAddons();
        }

        function renderTimeSlots() {
            const grid = document.getElementById('time-slots');
            grid.innerHTML = data.timeSlots.map(t => `
                <button type="button" onclick="selectTime('${t}')" class="border py-3 hover:border-accent ${state.time === t ? 'bg-accent text-white border-accent' : ''}">
                    ${t}
                </button>
            `).join('');
        }

        function selectTime(t) {
            state.time = t;
            renderTimeSlots();
            updateNavigation();
        }

        // Навигация и прогресс
        function updateNavigation() {
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            
            prevBtn.disabled = state.step === 1;
            nextBtn.style.display = state.step === 4 ? 'none' : 'block';

            let canGoNext = false;
            if (state.step === 1 && state.service) canGoNext = true;
            if (state.step === 2 && state.photographer) canGoNext = true;
            if (state.step === 3 && state.date && state.time) canGoNext = true;

            nextBtn.disabled = !canGoNext;
            
            if (state.step === 4) renderSummary();
        }

        function renderProgress() {
            const names = ['Услуга', 'Фотограф', 'Дата', 'Подтверждение'];
            const bar = document.getElementById('progress-bar');
            bar.innerHTML = names.map((name, i) => `
                <div class="flex flex-col items-center flex-1">
                    <div class="w-10 h-10 flex items-center justify-center border-2 ${state.step >= i+1 ? 'bg-accent border-accent text-white' : 'border-gray-300'}">
                        ${state.step > i+1 ? '✓' : i+1}
                    </div>
                    <span class="text-[10px] mt-1">${name}</span>
                </div>
            `).join('<div class="h-0.5 flex-1 bg-gray-200 mt-5"></div>');
        }

        function renderSummary() {
            const service = data.services.find(s => s.id === state.service);
            const photographer = data.photographers.find(p => p.id === state.photographer);
            const addonsTotal = data.addons.filter(a => state.addons.includes(a.id)).reduce((sum, a) => sum + a.price, 0);
            
            document.getElementById('summary-content').innerHTML = `
                <div><p class="text-sm text-muted-foreground">Услуга</p><p class="font-bold">${service.name}</p></div>
                <div><p class="text-sm text-muted-foreground">Фотограф</p><p class="font-bold">${photographer.name}</p></div>
                <div class="flex justify-between">
                    <div><p class="text-sm text-muted-foreground">Дата</p><p class="font-bold">${state.date}</p></div>
                    <div><p class="text-sm text-muted-foreground">Время</p><p class="font-bold">${state.time}</p></div>
                </div>
                <div class="border-t pt-4 flex justify-between text-xl font-bold">
                    <span>Итого:</span>
                    <span class="text-accent">${(service.price + addonsTotal).toLocaleString()} ₽</span>
                </div>
            `;
        }

        document.getElementById('next-btn').onclick = () => {
            state.step++;
            document.querySelectorAll('.step-content').forEach((el, i) => el.classList.toggle('active', i + 1 === state.step));
            renderProgress();
            updateNavigation();
        };

        document.getElementById('prev-btn').onclick = () => {
            state.step--;
            document.querySelectorAll('.step-content').forEach((el, i) => el.classList.toggle('active', i + 1 === state.step));
            renderProgress();
            updateNavigation();
        };

        document.getElementById('date-input').onchange = (e) => {
            state.date = e.target.value;
            updateNavigation();
        };

        init();
    </script>
</body>
</html>
